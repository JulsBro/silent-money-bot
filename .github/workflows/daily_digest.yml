name: 🤫💰 Silent Money Daily Digest

on:
  schedule:
    - cron: '0 5 * * *'   # 07:00 Berlin
    - cron: '0 9 * * *'   # 11:00 Berlin
    - cron: '30 12 * * *' # 14:30 Berlin
    - cron: '0 15 * * *'  # 17:00 Berlin
    - cron: '0 18 * * *'  # 20:00 Berlin
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run bot
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          CRYPTOPANIC_API_KEY: ${{ secrets.CRYPTOPANIC_API_KEY }}
          NEWS_API_KEY:        ${{ secrets.NEWS_API_KEY }}
          GIST_TOKEN:          ${{ secrets.GIST_TOKEN }}
          GIST_ID:             ${{ secrets.GIST_ID }}
        run: python crypto_news_bot.py

      - name: Backup log to repo
        run: |
          git config user.name "Silent Money Bot"
          git config user.email "bot@silentmoney.de"
          git add sent_news_log.json || true
          git diff --staged --quiet || git commit -m "log update [skip ci]"
          git push || true
