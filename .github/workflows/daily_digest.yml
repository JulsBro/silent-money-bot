name: 🤫💰 Silent Money Daily Digest

on:
  schedule:
    # 5x täglich (Berliner Zeit CEST = UTC+2)
    - cron: '0 5 * * *'   # 07:00 Berlin
    - cron: '0 9 * * *'   # 11:00 Berlin
    - cron: '30 12 * * *' # 14:30 Berlin
    - cron: '0 15 * * *'  # 17:00 Berlin
    - cron: '0 18 * * *'  # 20:00 Berlin
  workflow_dispatch:       # Manueller Start

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests yfinance

      - name: Run Silent Money Bot
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          CRYPTOPANIC_API_KEY: ${{ secrets.CRYPTOPANIC_API_KEY }}
          NEWS_API_KEY:        ${{ secrets.NEWS_API_KEY }}
        run: python crypto_news_bot.py
